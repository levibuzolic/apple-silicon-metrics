name: PR package size

# Comments on each PR with how much it changes the published npm package size,
# split into the compiled native binary and the JavaScript output. Compares the
# PR head against a from-source build of the base branch.

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-size-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  size:
    # Same-repo PRs only. Fork PRs get a read-only token (can't comment) and
    # aren't worth the runner minutes. pull_request_target would let forks comment
    # but runs untrusted PR code with a write token — not worth the security risk.
    if: github.event.pull_request.head.repo.full_name == github.repository
    # macos-14+ runners are Apple Silicon (arm64), required to build the addon.
    runs-on: macos-14
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          path: head

      - name: Checkout base branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            head
            base

      - name: Measure PR head
        working-directory: head
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          npm pack --dry-run --json > ../head.json

      - name: Measure base branch
        working-directory: base
        # A broken base build shouldn't block the PR comment — the report falls
        # back to no baseline (shows the head sizes as "new") if base.json is absent.
        continue-on-error: true
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          npm pack --dry-run --json > ../base.json

      - name: Render size comment
        run: node head/ts/pkg-size.ts base.json head.json > comment.md

      - name: Upsert sticky comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md', 'utf8');
            const marker = '<!-- pkg-size-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
